; ═══════════════════════════════════════════════════════════════════════════
;                   DIESEL PILOT — FREE — PlatformIO config
; ═══════════════════════════════════════════════════════════════════════════
; Firmware (USB):  pio run -t upload
; LittleFS:        pio run -t buildfs   /   pio run -t uploadfs   (wgrywa data/)
; Monitor:         pio device monitor
;
; Firmware (OTA, po włączeniu OTA w GUI):
;   pio run -t upload --upload-port <ip-urzadzenia>
;   (jeśli ustawiono hasło OTA, dodaj:  --upload-flags --auth=<haslo>)
; ═══════════════════════════════════════════════════════════════════════════

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; Tablica partycji: 2x app (OTA) + ~1.5 MB filesystem
board_build.partitions = default.csv
; System plików = LittleFS (a nie domyślny SPIFFS)
board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    olikraus/U8g2 @ ^2.35.30
    knolleary/PubSubClient @ ^2.8

; ── Wgrywanie firmware przez OTA (odkomentuj i ustaw IP/hasło) ──────────────
; upload_protocol = espota
; upload_port     = 192.168.1.50
; upload_flags    = --auth=twoje_haslo_ota
